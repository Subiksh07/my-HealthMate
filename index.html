<!DOCTYPE html>
<html>
<head>
    <title>HealthMate - Diet Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div style="text-align: right; margin: 10px;">
        {% if current_user.is_authenticated %}
            <a href="/profile">Profile</a> | <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a> | <a href="/signup">Sign Up</a>
        {% endif %}
    </div>

    <div class="container">
        <h1>HealthMate - Your Personal Diet Planner</h1>
        <p>Get a personalized Indian meal plan based on your health goals.</p>

        <form action="/recommend" method="POST">
            <!-- Hidden name from login -->
            <input type="hidden" name="name" value="{{ current_user.name }}">

            <label>Age:</label><br>
            <input type="number" name="age" required><br><br>

            <label>Gender:</label><br>
            <select name="gender" required>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select><br><br>

            <label>Weight (kg):</label><br>
            <input type="number" step="0.1" name="weight" required><br><br>

            <label>Height (cm or m):</label><br>
            <input type="number" step="0.01" name="height" placeholder="e.g., 170 or 1.7" required><br><br>

            <label>Activity Level:</label><br>
            <select name="activity" required>
                <option value="sedentary">Sedentary</option>
                <option value="lightly">Lightly active</option>
                <option value="moderately">Moderately active</option>
                <option value="very">Very active</option>
                <option value="extra">Extra active</option>
            </select><br><br>

            <label>Goal:</label><br>
            <select name="goal" required>
                <option value="lose">Lose Weight</option>
                <option value="maintain">Maintain Weight</option>
                <option value="gain">Gain Weight</option>
            </select><br><br>

            <label><input type="checkbox" name="vegetarian" value="yes"> Vegetarian</label><br>
            <label><input type="checkbox" name="vegan" value="yes"> Vegan</label><br>
            <label><input type="checkbox" name="diabetic" value="yes"> Diabetic (Low Sugar)</label><br><br>

            <label><input type="checkbox" name="weekly" value="yes"> Generate Weekly Plan</label><br><br>

            <button type="submit" class="btn">Generate Meal Plan</button>
        </form>
    </div>
</body>
</html>
