<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up - HealthMate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .signup-container {
            background: white;
            width: 420px;
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 30px;
        }
        .signup-container img {
            width: 120px;
            margin-bottom: 20px;
        }
        h1 {
            margin-bottom: 30px;
            color: #3f51b5;
            font-weight: 700;
            font-size: 32px;
            text-align: center;
        }
        form {
            width: 100%;
        }
        input[type=text], input[type=email], input[type=password] {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 22px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-size: 17px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input[type=text]:focus, input[type=email]:focus, input[type=password]:focus {
            border-color: #3f51b5;
            box-shadow: 0 0 10px rgba(63, 81, 181, 0.3);
        }
        button {
            width: 100%;
            padding: 16px 0;
            border-radius: 30px;
            border: none;
            background: #3f51b5;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #2c387e;
        }
        .links {
            margin-top: 18px;
            font-size: 16px;
            text-align: center;
        }
        .links a {
            color: #3f51b5;
            font-weight: 600;
            text-decoration: none;
            transition: text-decoration 0.3s ease;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #999;
            text-align: center;
            width: 100%;
        }
        @media (max-width: 450px) {
            .signup-container {
                width: 90%;
                padding: 30px 20px;
            }
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <img src="https://cdn-icons-png.flaticon.com/512/2933/2933185.png" alt="HealthMate Logo" />
        <h1>Create Account</h1>
        <form method="POST">
            <input type="text" name="name" placeholder="Your Name" required />
            <input type="email" name="email" placeholder="Email Address" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Sign Up</button>
        </form>
        <div class="links">
            Already have an account? <a href="/login">Login</a>
        </div>
        <div class="footer">
            &copy; 2025 HealthMate. Stay healthy, stay strong.
        </div>
    </div>
</body>
</html>
